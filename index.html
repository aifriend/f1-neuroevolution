<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 Racing ML - Neural Network Evolution</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0e1a;
      color: #fff;
      overflow: hidden;
    }

    canvas { display: block; }

    #webgl-canvas {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
    }

    #hud-canvas {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
    }

    .control-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(15, 20, 35, 0.92);
      border: 1px solid rgba(100, 150, 220, 0.25);
      border-radius: 12px;
      padding: 16px;
      backdrop-filter: blur(12px);
      max-width: 280px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      z-index: 100;
    }

    .control-panel h3 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: rgba(180, 220, 255, 0.7);
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .control-group {
      margin-bottom: 12px;
    }

    .control-group label {
      font-size: 11px;
      color: rgba(150, 180, 220, 0.85);
      display: block;
      margin-bottom: 4px;
    }

    .control-group select,
    .control-group input[type="number"] {
      width: 100%;
      background: rgba(30, 40, 60, 0.7);
      border: 1px solid rgba(100, 150, 220, 0.25);
      color: rgba(180, 220, 255, 0.95);
      padding: 5px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-family: 'Monaco', 'Menlo', monospace;
    }

    .control-group input[type="range"] {
      width: 100%;
      height: 20px;
      cursor: pointer;
      accent-color: rgba(255, 144, 48, 0.9);
    }

    .control-group .val {
      font-size: 11px;
      color: rgba(255, 200, 130, 0.9);
      font-family: 'Monaco', 'Menlo', monospace;
      float: right;
    }

    .control-group .checkbox-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .btn {
      flex: 1;
      background: rgba(255, 144, 48, 0.15);
      border: 1px solid rgba(255, 144, 48, 0.3);
      color: rgba(255, 200, 150, 0.9);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      transition: all 0.15s ease;
    }

    .btn:hover {
      background: rgba(255, 144, 48, 0.3);
      border-color: rgba(255, 144, 48, 0.5);
    }

    .btn-primary {
      background: rgba(255, 144, 48, 0.85);
      color: #000;
      border-color: transparent;
    }

    .btn-primary:hover {
      background: rgba(255, 144, 48, 1);
    }

    .toggle-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(255, 144, 48, 0.85);
      border: none;
      color: #000;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      z-index: 101;
      transition: all 0.2s ease;
      display: none;
    }

    .toggle-btn:hover {
      background: rgba(255, 144, 48, 1);
      transform: scale(1.05);
    }

    .control-panel.hidden { display: none; }
    .control-panel.hidden + .toggle-btn { display: block; }

    .cam-display {
      font-size: 11px;
      color: rgba(150, 180, 220, 0.7);
      padding: 4px 0;
      border-top: 1px solid rgba(100, 150, 220, 0.15);
      margin-top: 8px;
    }

    .cam-display span {
      color: rgba(255, 200, 130, 0.9);
      font-family: 'Monaco', 'Menlo', monospace;
    }

    .status-msg {
      margin-top: 10px;
      min-height: 16px;
      font-size: 11px;
      color: rgba(180, 220, 255, 0.75);
    }

    .status-ok { color: rgba(90, 255, 150, 0.95); }
    .status-warn { color: rgba(255, 210, 110, 0.95); }
    .status-error { color: rgba(255, 120, 120, 0.95); }
  </style>
</head>
<body>
  <canvas id="webgl-canvas"></canvas>
  <canvas id="hud-canvas"></canvas>

  <div class="control-panel" id="control-panel">
    <h3>Simulation Settings</h3>

    <div class="control-group">
      <label>Track</label>
      <select id="track-select">
        <option value="monaco">Monaco</option>
        <option value="suzuka">Suzuka</option>
        <option value="silverstone">Silverstone</option>
        <option value="spaghetti">Spaghetti</option>
        <option value="serpentine">Serpentine</option>
        <option value="inferno">Inferno</option>
        <option value="serpentine_bay">Serpentine Bay</option>
        <option value="ironcliff">Ironcliff</option>
        <option value="stormfront_gp">Stormfront GP</option>
      </select>
    </div>

    <div class="control-group">
      <label>Cars <span class="val" id="num-cars-val">30</span></label>
      <input type="range" id="num-cars" min="5" max="100" value="30" step="5">
    </div>

    <div class="control-group">
      <label>Speed <span class="val" id="speed-val">1.0x</span></label>
      <input type="range" id="speed-mult" min="0.5" max="3" value="1" step="0.1">
    </div>

    <div class="control-group">
      <label>Mutation Rate <span class="val" id="mutation-val">0.08</span></label>
      <input type="range" id="mutation-rate" min="0.02" max="0.3" value="0.08" step="0.01">
    </div>

    <div class="control-group">
      <label class="checkbox-row">
        <input type="checkbox" id="timeout-enabled" checked>
        <span>Timeout (frames)</span>
      </label>
      <input type="number" id="timeout-duration" min="100" max="5000" value="3500" step="100">
    </div>

    <div class="control-group">
      <label class="checkbox-row">
        <input type="checkbox" id="reset-training">
        <span>Reset training on apply</span>
      </label>
    </div>

    <div class="cam-display">
      Camera: <span id="cam-mode">top</span>
    </div>

    <div class="btn-row">
      <button class="btn" id="save-btn">Save Brain</button>
      <button class="btn" id="load-btn">Load Brain</button>
      <input type="file" id="load-file" accept=".json" style="display:none">
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="apply-btn">Apply & Restart</button>
      <button class="btn" id="hide-btn">Hide</button>
      <button class="btn" id="quit-btn">Quit</button>
    </div>

    <div id="status-msg" class="status-msg" aria-live="polite"></div>
  </div>

  <button class="toggle-btn" id="toggle-panel">Settings</button>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>

  <script type="module">
    import { main } from './js/main.js?v=29';

    const canvas = document.getElementById('webgl-canvas');
    const hudCanvas = document.getElementById('hud-canvas');

    main(canvas, hudCanvas);

    // Panel toggle
    document.getElementById('hide-btn').addEventListener('click', () => {
      document.getElementById('control-panel').classList.add('hidden');
    });
    document.getElementById('toggle-panel').addEventListener('click', () => {
      document.getElementById('control-panel').classList.remove('hidden');
    });
  </script>
</body>
</html>
